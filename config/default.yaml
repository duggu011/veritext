llm:
  provider: anthropic
  api_key_env: ANTHROPIC_API_KEY
  model: claude-sonnet-4-6
  max_retries: 3
  # Serialize LLM request starts to avoid token-per-minute rate-limit bursts.
  min_request_interval_seconds: 60
  timeout_seconds: 300
  # Keep a large completion budget for dense structured tool outputs.
  max_output_tokens: 32768
  temperature: 0.0
  # Only consulted for OpenAI reasoning models (gpt-5*, o1*, o3*, o4*); ignored
  # by Anthropic and standard Kimi paths.
  reasoning_effort: minimal
  # Anthropic prompt caching for stable system/tool/user-prefix blocks.
  prompt_cache_enabled: true
  # Optional per-stage overrides keyed by planner, executor, critic, verifier, reconciler.
  stage_overrides:
    planner: {}
    executor: {}
    reconciler: {}
chunking:
  tokenizer: cl100k_base
  window_tokens: 1200
  overlap_tokens: 120
  boundary_mode: token_window
  tokenizer_policy: tiktoken
  allow_oversized_atomic_chunks: true
execution:
  max_stage_concurrency: 4
  max_chunk_concurrency: 2
  max_llm_attempts: 2
  critic_batch_size: 20
  verifier_batch_size: 20
audit:
  database_path: .veritext/audit.sqlite3
logging:
  level: INFO
  format: json
prompts:
  directory: prompts
domain_packs:
  directory: config/domain_packs
schema_registry:
  directory: .veritext/schema_registry
  require_approved_schema: false
  minimum_schema_coverage: 0.65
reporting:
  static_provenance_context_radius: 80
  signing:
    enabled: false
    algorithm: hmac-sha256
    key_id: local-dev
    key_env: REPORT_SIGNING_KEY
    manifest_suffix: .manifest.json
  confidence_buckets:
    - bucket_name: verified
      minimum_confidence: 0.85
    - bucket_name: probable
      minimum_confidence: 0.65
    - bucket_name: tentative
      minimum_confidence: 0.0
